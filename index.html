<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXiRON Live Sports</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: 'Poppins', sans-serif; background-color: #0b0f19; color: #fff; }
.glass { background: rgba(30,41,59,0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s, box-shadow 0.3s; }
.glass:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
.live-dot { animation: blink 1.5s infinite; }
@keyframes blink { 0% { opacity:1; } 50% { opacity:0.3; } 100% { opacity:1; } }
.score-pulse { animation: pulse 1s infinite; }
@keyframes pulse { 0% { opacity:1; } 50% { opacity:0.6; } 100% { opacity:1; } }
</style>
</head>
<body class="pb-10">

<main class="container mx-auto mt-20 px-4">

<!-- Football Section -->
<section id="scores" class="mb-12">
<h2 class="text-2xl font-bold flex items-center mb-6">
<span class="w-3 h-3 bg-red-500 rounded-full mr-2 live-dot"></span> ফুটবল ম্যাচ
</h2>
<div id="score-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
<div class="p-6 glass rounded-2xl flex flex-col items-center">
<p class="text-gray-400">ম্যাচ লোড হচ্ছে...</p>
</div>
</div>
</section>

<!-- Cricket Section -->
<section id="cricket" class="mb-12">
<h2 class="text-2xl font-bold flex items-center mb-6">
<span class="w-3 h-3 bg-blue-500 rounded-full mr-2 live-dot"></span> ক্রিকেট ম্যাচ
</h2>
<div id="cricket-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
<div class="p-6 glass rounded-2xl flex flex-col items-center">
<p class="text-gray-400">ম্যাচ লোড হচ্ছে...</p>
</div>
</div>
</section>

</main>

<script>
// -------------------------
// API Keys
// -------------------------
const footballKey = "YOUR_FOOTBALL_API_KEY";
const cricketKey = "YOUR_CRICKET_API_KEY";
const cricketHost = "cricket-live-line1.p.rapidapi.com";

// -------------------------
// Trigger Ads / Actions
// -------------------------
function triggerRewardedAd(reason){ alert(reason + " Ad দেখুন।"); }

// -------------------------
// Fetch Football Matches
// -------------------------
async function fetchLiveScores(){
const container = document.getElementById('score-container');
try{
const res = await fetch('https://v3.football.api-sports.io/fixtures?live=all', {
method:"GET",
headers:{"x-apisports-key":footballKey}
});
const data = await res.json();
displayFootball(data.response);
}catch(err){
container.innerHTML='<p class="text-red-400">ফুটবল লোড হতে সমস্যা হয়েছে।</p>';
}
}

// Display Football
function displayFootball(matches){
const container = document.getElementById('score-container');
container.innerHTML='';
matches.forEach(match=>{
const matchType = match.league.name;
const status = match.fixture.status.short;
const isLive = (status==='LIVE' || status==='1H' || status==='2H' || status==='HT');
const homeFlag = match.teams.home.logo || 'https://via.placeholder.com/24x16';
const awayFlag = match.teams.away.logo || 'https://via.placeholder.com/24x16';
const matchTime = new Date(match.fixture.date).toLocaleString('bn-BD',{ hour12:true });
const div = document.createElement('div');
div.className = 'p-6 glass rounded-2xl flex flex-col items-center';
div.innerHTML=`
<div class="flex justify-between w-full text-[12px] text-gray-400 font-bold uppercase mb-2">
<span>${matchType}</span>
<span class="${isLive?'text-red-500 live-dot':'text-gray-400'}">${isLive?'LIVE':status}</span>
</div>
<div class="flex justify-between items-center w-full text-center mb-2">
<div class="flex flex-col items-center w-1/3">
<img src="${homeFlag}" class="w-6 h-4 mb-1">
<p class="font-bold text-sm">${match.teams.home.name}</p>
</div>
<div class="text-xl font-black bg-slate-800 px-3 py-1 rounded score-pulse">
${match.goals.home} - ${match.goals.away}
</div>
<div class="flex flex-col items-center w-1/3">
<img src="${awayFlag}" class="w-6 h-4 mb-1">
<p class="font-bold text-sm">${match.teams.away.name}</p>
</div>
</div>
<p class="text-xs text-gray-400">${matchTime}</p>`;
div.onclick = ()=> triggerRewardedAd(status);
container.appendChild(div);
});
}

// -------------------------
// Fetch Cricket Matches
// -------------------------
async function fetchCricketScores(){
const container=document.getElementById('cricket-container');
try{
const res = await fetch('https://cricket-live-line1.p.rapidapi.com/get-live-matches',{
method:"GET",
headers:{"x-rapidapi-key":cricketKey,"x-rapidapi-host":cricketHost}
});
const data=await res.json();
displayCricket(data.results);
}catch(err){
container.innerHTML='<p class="text-red-400">ক্রিকেট লোড হতে সমস্যা হয়েছে।</p>';
}
}

// Display Cricket Matches
function displayCricket(matches){
const container=document.getElementById('cricket-container');
container.innerHTML='';
if(!matches || matches.length===0){ container.innerHTML='<p class="text-gray-400">কোনো ম্যাচ নেই।</p>'; return; }
matches.forEach(match=>{
const matchType = match.match_type || 'Cricket';
const status = match.status || 'UPCOMING';
const isLive = (status==='LIVE');
const div=document.createElement('div');
div.className='p-6 glass rounded-2xl flex flex-col items-center';
div.innerHTML=`
<div class="flex justify-between w-full text-[12px] text-gray-400 font-bold uppercase mb-2">
<span>${matchType}</span>
<span class="${isLive?'text-red-500 live-dot':'text-gray-400'}">${isLive?'LIVE':status}</span>
</div>
<div class="flex justify-between items-center w-full text-center mb-2">
<div class="flex flex-col items-center w-1/3">
<img src="${match.flag_a || 'https://via.placeholder.com/24x16'}" class="w-6 h-4 mb-1">
<p class="font-bold text-sm">${match.team_a}</p>
</div>
<div class="text-lg font-black bg-slate-800 px-3 py-1 rounded score-pulse">
${match.score_a || '0/0'} - ${match.score_b || '0/0'}
</div>
<div class="flex flex-col items-center w-1/3">
<img src="${match.flag_b || 'https://via.placeholder.com/24x16'}" class="w-6 h-4 mb-1">
<p class="font-bold text-sm">${match.team_b}</p>
</div>
</div>
<p class="text-xs text-gray-400">${match.date_time || ''}</p>`;
div.onclick=()=> triggerRewardedAd(status);
container.appendChild(div);
});
}

// -------------------------
// Auto-refresh every 5 min
// -------------------------
window.onload=()=>{
fetchLiveScores();
fetchCricketScores();
setInterval(()=>{ fetchLiveScores(); fetchCricketScores(); }, 5*60*1000);
};
</script>

</body>
</html>
