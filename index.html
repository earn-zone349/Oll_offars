<script>
// ================== Firebase Config ==================
const firebaseConfig = {

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================== Elements ==================
const player = document.getElementById("player");

const liveList = document.getElementById("live-list");
const upcomingList = document.getElementById("upcoming-list");

// ================== Player Functions ==================
function playLive(url) {
    if (!url) return alert("No link!");

const finalUrl = `https://oll-offars-7jgp.onrender.com/fetch.php?id=${encodeURIComponent(url)}`;

    videoContainer.style.display = "flex";

    if (window.currentHls) {
        window.currentHls.destroy();
    }

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(finalUrl);  // proxy URL ব্যবহার
        hls.attachMedia(player);
        window.currentHls = hls;
    } else {
        player.src = finalUrl;  // proxy URL fallback
    }

    player.muted = true;
    player.play().then(()=>{
        player.muted = false;
    }).catch(()=>{});
}

function closePlayer() {
    if (window.currentHls) {
        window.currentHls.destroy();
        window.currentHls = null;
    }
    player.pause();
    player.src = "";
    videoContainer.style.display = "none";
}

// ================== Create Match Card ==================
function createCard(match) {
    // ১. স্ট্যাটাস চেক করার নিরাপদ উপায়
    const currentStatus = (match.status || 'UPCOMING').toUpperCase();
    const statusClass = currentStatus.toLowerCase();
    
    let statusHTML = `<div class="status ${statusClass}">${currentStatus}</div>`;
    
    // টাইটেল দেখানোর লজিক
    const titleHTML = match.title ? `<div style="font-size: 10px; color: var(--accent); background: rgba(0, 210, 255, 0.1); padding: 2px 8px; border-radius: 10px; margin-bottom: 5px; display: inline-block; border: 1px solid rgba(0, 210, 255, 0.2);">${match.title}</div>` : '';

    const smartLink = "https://acceptancesuicidegel.com/wuaw1fnkac?key=c0aaab542e005284cf06c34fc39bf233";

    // ২. এখানে currentStatus ব্যবহার করা হয়েছে যাতে ভুল না হয়
    const clickAction = currentStatus === "LIVE" 
    ? `playLive('${match.link || ''}')` 
    : `window.open('${smartLink}', '_blank')`;

    return `
    <div class="match-card" onclick="${clickAction}">
        <div class="team">
            <img src="${match.teamA_logo || 'https://via.placeholder.com/52'}" onerror="this.src='https://via.placeholder.com/52'">
            <div>${match.teamA_name}</div>
        </div>
        <div class="vs">
            ${titleHTML} <br>
            ${statusHTML}
            <div style="font-size:20px; font-weight:bold; color:var(--text); text-shadow: 0 0 15px var(--glow); margin:4px 0;">VS</div>
            <div class="time">${match.time || ''}</div>
        </div>
        <div class="team">
            <img src="${match.teamB_logo || 'https://via.placeholder.com/52'}" onerror="this.src='https://via.placeholder.com/52'">
            <div>${match.teamB_name}</div>
        </div>
    </div>`;
}



// ================== Tab Switching ==================

// ================== Firebase Real-time Listener ==================
let allMatchesData = []; // সব ডাটা রাখার জন্য

db.ref("matches").on("value", (snapshot) => {
    const data = snapshot.val();
    if (!data) {
        liveList.innerHTML = upcomingList.innerHTML = finishedList.innerHTML = `<div class="empty">No matches found</div>`;
        return;
    }

    allMatchesData = Object.values(data);
    updateCategoryCounts(); // আইকনের ওপর সংখ্যা আপডেট করবে
    renderFilteredMatches(); // খেলাগুলো দেখাবে
});

function updateCategoryCounts() {
    let counts = { all: 0, cricket: 0, football: 0 };
    allMatchesData.forEach(m => {
        if (!m || !m.status) return;
        counts.all++;
        if(m.category === 'cricket') counts.cricket++;
        if(m.category === 'football') counts.football++;
    });
    document.getElementById("count-all").innerText = counts.all;
    document.getElementById("count-cricket").innerText = counts.cricket;
    document.getElementById("count-football").innerText = counts.football;
}

switchTab(0);
    // 1. Sharing function
function shareApp() {
    if (navigator.share) {
        navigator.share({
            title: 'AXiRON Sports',
            text: 'Watch live games for free!',
            url: window.location.href
        });
    } else {
        navigator.clipboard.writeText(window.location.href);
        alert("Link copied!");
    }
}

// 2. Fetched from the highlights database
db.ref("highlights").on("value", (snapshot) => {
    const data = snapshot.val();
    const list = document.getElementById("highlights-list");
    list.innerHTML = "";
    if (!data) {

    Object.values(data).forEach(h => {
        list.innerHTML += `

            <div style="font-weight:bold;"> ${h.title}</div>
            <div style="font-size:12px; color:var(--gray);">Click to watch highlights</div>
        </div>`;
    });
});

// 3. Update switch tab function (replace switchTab function)
function switchTab(index) {
    const tabs = ['live-tab', 'upcoming-tab', 'finished-tab', 'highlights-tab'];
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById(tabs[index]).style.display = 'block';
    document.querySelectorAll('.nav-item')[index].classList.add('active');
}   

let currentCategory = 'all';
let allData = [];

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`cat-${cat}`).classList.add('active');
    renderFilteredMatches();
}
// --- গ্লোবাল টাইম এবং অটো-স্ট্যাটাস লজিক (রাকিব ভাইয়ের জন্য) ---

function formatMatchTime(matchStartTime) {
    const event = new Date(matchStartTime);
    return event.toLocaleString([], { hour: '2-digit', minute: '2-digit', hour12: true }); 
}

function updateMatchStatus(matchStartTime) {
    const now = new Date().getTime();
    const startTime = new Date(matchStartTime).getTime(); 
    const endTime = startTime + (3 * 60 * 60 * 1000); // ৩ ঘণ্টা পর খেলা শেষ ধরবে 

    if (now < startTime) return "UPCOMING";
    else if (now >= startTime && now <= endTime) return "LIVE";
    else return "FINISHED";
}

// এই ফাংশনটা তোর কোডে আগে থেকেই আছে, শুধু এটা দিয়ে রিপ্লেস কর
function renderFilteredMatches() {
    let liveHTML = "", upcomingHTML = "", finishedHTML = "";

    allMatchesData.forEach(match => {
        if (!match || !match.full_date_time) return;

        // অটোমেটিক স্ট্যাটাস এবং টাইম আপডেট
        const currentStatus = updateMatchStatus(match.full_date_time);
        const displayTime = formatMatchTime(match.full_date_time);
        
        if (currentCategory !== 'all' && match.category !== currentCategory) return;

        // কার্ড তৈরি করার সময় নতুন স্ট্যাটাস এবং টাইম পাঠানো হচ্ছে
        const card = createCard({...match, status: currentStatus, time: displayTime});
        
        if (currentStatus === "LIVE") liveHTML += card;
        else if (currentStatus === "UPCOMING") upcomingHTML += card;
        else finishedHTML += card;
    });

    liveList.innerHTML = liveHTML || `<div class="empty">No Live Matches</div>`;
    upcomingList.innerHTML = upcomingHTML || `<div class="empty">No Upcoming Matches</div>`;
    finishedList.innerHTML = finishedHTML || `<div class="empty">No Finished Matches</div>`;
}



// --- রাকিবের নতুন লজিক (৫টি অ্যাড এবং ১ ঘণ্টা মেমোরি) ---
let adsWatched = parseInt(localStorage.getItem('rakib_ads')) || 0;
let unlockTime = localStorage.getItem('rakib_unlock_time');

function checkUnlockStatus() {
    if (unlockTime && Date.now() < unlockTime) {

function makeFullScreen() {
    const video = document.getElementById("player");

    // সবচেয়ে আগে video native fullscreen (সব অ্যান্ড্রয়েডে কাজ করবে)
    if (video.webkitEnterFullscreen) {
        video.webkitEnterFullscreen();
    } 
    // standard fullscreen
    else if (video.requestFullscreen) {
        video.requestFullscreen();
    } 
    // chrome / safari fallback
    else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
    } 
    else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
    }

    // Landscape mode force (ফোন কাত হয়ে যাবে)
    if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(() => {});
    }
}

// ভিডিওর ফুল স্ক্রিন স্টেট চেঞ্জ হ্যান্ডেলার (ঐচ্ছিক কিন্তু ভালো)
document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
        // ফুল স্ক্রিন থেকে বের হলে ফোন আবার সোজা (Portrait) হয়ে যাবে
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    }
});
// ইন্টারনেট কানেকশন চেক করার ফাংশন
function checkInternet() {
    if (!navigator.onLine) {
        // নেট না থাকলে লাল রঙের একটা নোটিফিকেশন দেখাবে
        const offlineBox = document.createElement('div');
        offlineBox.id = "offline-notice";
        offlineBox.innerHTML = `
            <div style="position: fixed; top: 0; left: 0; width: 100%; background: #ff3333; color: white; text-align: center; padding: 10px; z-index: 9999; font-weight: bold; font-size: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
                ⚠️ No Internet Connection! Please check your data/WiFi.
            </div>`;
        document.body.appendChild(offlineBox);
    } else {
        // নেট ফিরে আসলে নোটিফিকেশন সরিয়ে ফেলবে
        const notice = document.getElementById("offline-notice");
        if (notice) notice.remove();
    }
}

// নেট আসা বা যাওয়ার সাথে সাথে অটোমেটিক চেক হবে
window.addEventListener('online', checkInternet);
window.addEventListener('offline', checkInternet);

// পেজ লোড হওয়ার সময় একবার চেক করবে
checkInternet();

history.pushState(null, null, location.href);
window.onpopstate = function () {
    if (videoContainer.style.display === "flex") {
        closePlayer();
    }
};
