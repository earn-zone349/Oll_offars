<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXiRON Sports Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
    --bg: #05070a; 
    --glass: rgba(255, 255, 255, 0.05); 
    --accent: #00d2ff; 
    --glow: rgba(0, 210, 255, 0.4);
    --text: #ffffff;
    --badge: #ff416c;
    --gray: rgba(255,255,255,0.6);
}

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
    background: radial-gradient(circle at 50% 10%, #1c2b53 0%, #05070a 100%);
    color: var(--text);
    padding-bottom: 80px;
    min-height: 100vh;
    background-attachment: fixed; 
}

        header {
    background: rgba(5, 7, 10, 0.6);
    backdrop-filter: blur(10px);
    padding: 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
}
.nav-item.active {
    color: var(--accent);
    text-shadow: 0 0 10px var(--glow);
}

header h2 {
    background: linear-gradient(135deg, #7b61ff, #00d2ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
    font-size: 1.6rem;
}

        .section-title {
    padding: 12px 16px;
    color: var(--accent); /*   */
    font-size: 1.1rem;
    font-weight: 700;
    background: transparent; /*   */
    position: sticky;
    top: 57px;
    z-index: 99;
}

      .match-card {
    background: var(--glass);
    backdrop-filter: blur(15px);
    margin: 15px;
    padding: 20px;
    border-radius: 20px;
    border: 1px solid rgba(0, 210, 255, 0.1); 
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: 0.3s;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.team img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 8px;
    border: 2px solid rgba(0, 210, 255, 0.2); 
    box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
}

.match-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
    transform: translateY(-3px);
}

.team div {
    font-size: 13px;
    font-weight: 600;
    margin-top: 5px;
    text-shadow: 0 0 8px rgba(0,210,255,0.3);
}

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 35%;
        }

        .vs {
            text-align: center;
            flex: 1;
        }

        .status {
    font-size: 10px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 4px;
}
.live {
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
    box-shadow: 0 0 10px rgba(255, 65, 108, 0.5);
    animation: blink 1s infinite;
}

.upcoming { background: rgba(255, 165, 0, 0.1); color: #ffa500; border: 1px solid rgba(255, 165, 0, 0.2); }
.finished { background: rgba(255, 255, 255, 0.05); color: #888; border: 1px solid rgba(255, 255, 255, 0.1); }

        .time {
            font-size: 12px;
            color: var(--gray);
            margin-top: 4px;
        }

        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 1000;
            flex-direction: column;
        }

        video {
            flex: 1;
            width: 100%;
        }

        .close-btn {
            background: #ff3333;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        .bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(5, 7, 10, 0.9); /*    */
    backdrop-filter: blur(20px);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 12px; /*     */
    border-top: 1px solid rgba(255,255,255,0.05);
    z-index: 200;
}

        .nav-item {
            color: var(--gray);
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            padding: 6px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 2px;
        }

        .empty {
            text-align: center;
            color: var(--gray);
            padding: 40px 20px;
            font-style: italic;
        }

        .loader {
            text-align: center;
            padding: 30px;
            color: var(--gray);
        }
        /* new share button and highlight card design */
.share-btn {
    background: #238636;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    margin: 15px auto;
    cursor: pointer;
    width: 90%;
    display: block;
    font-weight: bold;
}

.highlight-card {
    background: var(--glass);
    backdrop-filter: blur(15px);
    margin: 10px 16px;
    padding: 18px;
    border-radius: 15px;
    border: 1px solid rgba(255, 215, 0, 0.2); /*   */
    cursor: pointer;
    transition: 0.3s;
}
.highlight-card:hover {
    border-color: #f1c40f;
    box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

.cat-item.active div {
    border-color: var(--accent) !important;
    box-shadow: 0 0 15px var(--glow);
    transform: scale(1.1);
}

.cat-item div {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 2px solid rgba(255, 255, 255, 0.05);
}

.cat-item.active div {
    border-color: var(--accent) !important;
    transform: scale(1.05);
    background: rgba(0, 210, 255, 0.1);
}

    </style>
</head>
<body>

<header>
    <h2> AXiRON Sports</h2>
</header>

<div class="category-bar" style="display: flex; overflow-x: auto; padding: 15px; gap: 15px; background: rgba(5, 7, 10, 0.5);">
    
    <div class="cat-item active" onclick="setCategory('all')" id="cat-all" style="text-align: center; min-width: 65px;">
        <div style="width: 55px; height: 55px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid rgba(255,255,255,0.1);">
            <img src="https://cdn-icons-png.flaticon.com/512/3112/3112733.png" style="width: 30px; height: 30px;">
            <span id="count-all" style="position: absolute; top: 0; right: 0; background: var(--badge); font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">0</span>
        </div>
        <div style="font-size: 11px; margin-top: 5px;">All</div>
    </div>

    <div class="cat-item" onclick="setCategory('cricket')" id="cat-cricket" style="text-align: center; min-width: 65px;">
        <div style="width: 55px; height: 55px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid rgba(255,255,255,0.1);">
            <img src="https://cdn-icons-png.flaticon.com/512/5355/5355931.png" style="width: 30px; height: 30px;">
            <span id="count-cricket" style="position: absolute; top: 0; right: 0; background: var(--badge); font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">0</span>
        </div>
        <div style="font-size: 11px; margin-top: 5px;">Cricket</div>
    </div>

    <div class="cat-item" onclick="setCategory('football')" id="cat-football" style="text-align: center; min-width: 65px;">
        <div style="width: 55px; height: 55px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid rgba(255,255,255,0.1);">
            <img src="https://cdn-icons-png.flaticon.com/512/3313/3313482.png" style="width: 30px; height: 30px;">
            <span id="count-football" style="position: absolute; top: 0; right: 0; background: var(--badge); font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">0</span>
        </div>
        <div style="font-size: 11px; margin-top: 5px;">Football</div>
    </div>

</div>


<!-- Video Player -->
<div id="video-container">
    <video id="player" controls autoplay playsinline></video>
    <button class="close-btn" onclick="closePlayer()"> Close Player</button>
</div>

<!-- Live -->
<div id="live-tab" class="tab-content">
    <div class="section-title"> Live Matches</div>
    <div id="live-list"></div>
</div>

<!-- Upcoming -->
<div id="upcoming-tab" class="tab-content" style="display:none;">
    <div class="section-title"> Upcoming Matches</div>
    <div id="upcoming-list"></div>
</div>

<!-- Finished -->
<div id="finished-tab" class="tab-content" style="display:none;">
    <div class="section-title"> Finished Matches</div>
    <div id="finished-list"></div>
</div>

    <div id="share-section" style="text-align: center;">
    <button class="share-btn" onclick="shareApp()"> Share AXiRON Sports</button>
</div>

<div id="highlights-tab" class="tab-content" style="display:none;">
    <div class="section-title"> Match Highlights</div>
    <div id="highlights-list"></div>
</div>
<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab(0)">
        <span></span><br>Live
    </div>
    <div class="nav-item" onclick="switchTab(1)">
        <span></span><br>Upcoming
    </div>
    <div class="nav-item" onclick="switchTab(2)">
        <span></span><br>Finished
    </div>
    <div class="nav-item" onclick="switchTab(3)">
        <span></span><br>Highlights
    </div>
</div>
<script>
// ================== Firebase Config ==================
const firebaseConfig = {
    apiKey: "AIzaSyBDFd5ppHf-CdFF2Vg4Th_P_FIvJmQZd9w",
    databaseURL: "https://earnzip-a8766-default-rtdb.firebaseio.com/",   // : https://your-project-default-rtdb.firebaseio.com/
    projectId: "earnzip-a8766"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================== Elements ==================
const player = document.getElementById("player");
const videoContainer = document.getElementById("video-container");

const liveList = document.getElementById("live-list");
const upcomingList = document.getElementById("upcoming-list");
const finishedList = document.getElementById("finished-list");

// ================== Player Functions ==================
function playLive(url) {
    if (!url) return alert("No live stream link available for this match.");

    videoContainer.style.display = "flex";
    player.innerHTML = ''; // clear previous

    if (Hls.isSupported()) {
        const hls = new Hls({
            liveSyncDurationCount: 3,
            liveMaxLatencyDurationCount: 5,
            lowLatencyMode: true
        });
        hls.loadSource(url);
        hls.attachMedia(player);
        window.currentHls = hls; // store for cleanup
    } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
        player.src = url;
    } else {
        alert("Your browser doesn't support HLS streaming.");
    }
}

function closePlayer() {
    if (window.currentHls) {
        window.currentHls.destroy();
        window.currentHls = null;
    }
    player.pause();
    player.src = "";
    videoContainer.style.display = "none";
}

// ================== Create Match Card ==================
function createCard(match) {
    const statusClass = (match.status || '').toLowerCase();
    let statusHTML = `<div class="status ${statusClass}">${match.status}</div>`;

    return `
    <div class="match-card" onclick="playLive('${match.live_link || ''}')">
        <div class="team">
            <img src="${match.teamA_logo || 'https://via.placeholder.com/52'}" onerror="this.src='https://via.placeholder.com/52'">
            <div>${match.teamA_name}</div>
        </div>
        <div class="vs">
            ${statusHTML}
            <div style="font-size:22px; font-weight:bold; color:var(--text); text-shadow: 0 0 15px var(--glow); margin:6px 0;">VS</div>
            <div class="time">${match.time || ''}</div>
        </div>
        <div class="team">
            <img src="${match.teamB_logo || 'https://via.placeholder.com/52'}" onerror="this.src='https://via.placeholder.com/52'">
            <div>${match.teamB_name}</div>
        </div>
    </div>`;
}

// ================== Tab Switching ==================

// ================== Firebase Real-time Listener ==================
let allMatchesData = []; // à¦¸à¦¬ à¦¡à¦¾à¦Ÿà¦¾ à¦°à¦¾à¦–à¦¾à¦° à¦œà¦¨à§à¦¯

db.ref("matches").on("value", (snapshot) => {
    const data = snapshot.val();
    if (!data) {
        liveList.innerHTML = upcomingList.innerHTML = finishedList.innerHTML = `<div class="empty">No matches found</div>`;
        return;
    }

    allMatchesData = Object.values(data);
    updateCategoryCounts(); // à¦†à¦‡à¦•à¦¨à§‡à¦° à¦“à¦ªà¦° à¦¸à¦‚à¦–à§à¦¯à¦¾ à¦†à¦ªà¦¡à§‡à¦Ÿ à¦•à¦°à¦¬à§‡
    renderFilteredMatches(); // à¦–à§‡à¦²à¦¾à¦—à§à¦²à§‹ à¦¦à§‡à¦–à¦¾à¦¬à§‡
});

function updateCategoryCounts() {
    let counts = { all: 0, cricket: 0, football: 0 };
    allMatchesData.forEach(m => {
        if (!m || !m.status) return;
        counts.all++;
        if(m.category === 'cricket') counts.cricket++;
        if(m.category === 'football') counts.football++;
    });
    document.getElementById("count-all").innerText = counts.all;
    document.getElementById("count-cricket").innerText = counts.cricket;
    document.getElementById("count-football").innerText = counts.football;
}

// Initial tab
switchTab(0);
    // 1. Sharing function
function shareApp() {
    if (navigator.share) {
        navigator.share({
            title: 'AXiRON Sports',
            text: 'Watch live games for free!',
            url: window.location.href
        });
    } else {
        navigator.clipboard.writeText(window.location.href);
        alert("Link copied!");
    }
}

// 2. Fetched from the highlights database
db.ref("highlights").on("value", (snapshot) => {
    const data = snapshot.val();
    const list = document.getElementById("highlights-list");
    list.innerHTML = "";
    if (!data) {
        list.innerHTML = '<div class="empty">No highlights yet.</div>';
        return;
    }
    Object.values(data).forEach(h => {
        list.innerHTML += `
        <div class="highlight-card" onclick="playLive('${h.link}')">
            <div style="font-weight:bold;"> ${h.title}</div>
            <div style="font-size:12px; color:var(--gray);">Click to watch highlights</div>
        </div>`;
    });
});

// 3. Update switch tab function (replace switchTab function)
function switchTab(index) {
    const tabs = ['live-tab', 'upcoming-tab', 'finished-tab', 'highlights-tab'];
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById(tabs[index]).style.display = 'block';
    document.querySelectorAll('.nav-item')[index].classList.add('active');
}   

let currentCategory = 'all';
let allData = [];

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`cat-${cat}`).classList.add('active');
    renderFilteredMatches();
}

function renderFilteredMatches() {
    let liveHTML = "", upcomingHTML = "", finishedHTML = "";

    allMatchesData.forEach(match => {
        if (!match || !match.status) return;
        
        // à¦•à§à¦¯à¦¾à¦Ÿà¦¾à¦—à¦°à¦¿ à¦«à¦¿à¦²à§à¦Ÿà¦¾à¦° à¦šà§‡à¦•
        if (currentCategory !== 'all' && match.category !== currentCategory) return;

        const card = createCard(match);
        if (match.status.toUpperCase() === "LIVE") liveHTML += card;
        else if (match.status.toUpperCase() === "UPCOMING") upcomingHTML += card;
        else finishedHTML += card;
    });

    liveList.innerHTML = liveHTML || `<div class="empty">No Live Matches</div>`;
    upcomingList.innerHTML = upcomingHTML || `<div class="empty">No Upcoming Matches</div>`;
    finishedList.innerHTML = finishedHTML || `<div class="empty">No Finished Matches</div>`;
}

</script>

</body>
</html>
