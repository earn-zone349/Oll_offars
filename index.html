<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXiRON Live TV - Sportzfy Style</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { background-color: #ff0000; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .container { padding: 15px; max-width: 900px; margin: auto; }
        
        /* Player Box */
        #video-container { width: 100%; background: #000; border-radius: 8px; border: 2px solid #333; overflow: hidden; aspect-ratio: 16 / 9; }
        .video-js { width: 100%; height: 100%; }

        /* Channel List */
        .list-title { margin-top: 25px; border-left: 4px solid #ff0000; padding-left: 10px; font-size: 18px; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 15px; }
        .channel-card { background: #1e1e1e; padding: 15px 10px; text-align: center; border-radius: 12px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .channel-card:hover { background: #ff0000; transform: scale(1.05); }
        .channel-card img { width: 45px; height: 45px; object-fit: contain; display: block; margin: 0 auto 8px; }
        .channel-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Search Bar */
        .search-box { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: #222; color: white; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>AXiRON LIVE SPORTS</header>

<div class="container">
    <div id="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" poster="https://via.placeholder.com/800x450/000000/FFFFFF?text=AXiRON+Live+TV">
            <p class="vjs-no-js">To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video</p>
        </video>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Search Channel (T Sports, GTV...)" onkeyup="filterChannels()">

    <h3 class="list-title">Live Channels</h3>
    <div id="channelGrid" class="channel-grid">
        </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>
    const player = videojs('my-video');

    // সরাসরি চ্যানেল লিস্ট (এটি জাদুর মতো সাথে সাথে আসবে)
    const channels = [
        {
            name: "T Sports",
            logo: "https://upload.wikimedia.org/wikipedia/commons/e/e6/T_Sports_Logo.png",
            url: "https://raw.githubusercontent.com/tahsinulmohsin/jagobd-m3u8-scraper/master/playlist.m3u8"
        },
        {
            name: "GTV",
            logo: "https://www.jagobd.com/img/tv_logos/gtv.png",
            url: "https://raw.githubusercontent.com/tahsinulmohsin/jagobd-m3u8-scraper/master/playlist.m3u8"
        },
        {
            name: "BTV World",
            logo: "https://www.jagobd.com/img/tv_logos/btv_world.png",
            url: "https://raw.githubusercontent.com/tahsinulmohsin/jagobd-m3u8-scraper/master/playlist.m3u8"
        }
    ];

    function loadChannels(filteredList) {
        const grid = document.getElementById('channelGrid');
        grid.innerHTML = '';
        
        filteredList.forEach(channel => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/50?text=TV'">
                <div class="channel-name">${channel.name}</div>
            `;
            card.onclick = () => {
                player.src({ src: channel.url, type: 'application/x-mpegURL' });
                player.play();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            grid.appendChild(card);
        });
    }

    function filterChannels() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
        loadChannels(filtered);
    }

    // প্রথমবার লোড হওয়া
    loadChannels(channels);
</script>

</body>
</html>
