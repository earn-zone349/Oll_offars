<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnCash Pro v3.2 - Task Update</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    body { background:#0f172a; color:white; font-family: sans-serif; overflow-x: hidden; }
    .tab { display:none; }
    .active { display:block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .gradient-btn { background: linear-gradient(90deg,#fbbf24,#f59e0b); transition: 0.2s; }
    .gradient-btn:active { transform: scale(0.95); }
    .nav-btn { color: #94a3b8; transition: 0.3s; }
    .nav-btn.active-nav { color: #fbbf24; transform: translateY(-5px); }
    .task-card { background: rgba(30, 41, 59, 0.5); border-left: 4px solid #fbbf24; }
</style>
</head>

<body class="max-w-md mx-auto p-4 pb-24">

<h1 class="text-center text-2xl font-bold text-yellow-400 mb-6 italic">
    EarnCash Pro <span class="text-white text-xs font-light">v3.2</span>
</h1>

<div class="glass-card p-5 rounded-2xl mb-6 flex justify-between items-center border-b-2 border-yellow-500 shadow-lg">
    <div>
        <p class="text-gray-400 text-xs" id="userName">Hi, User</p>
        <div class="flex items-center gap-1">
            <span class="text-2xl font-bold text-yellow-400" id="coins">0</span>
            <span class="text-xs text-gray-300">Coins</span>
        </div>
    </div>
    <div class="text-right">
        <p class="text-gray-400 text-xs">Total Refers</p>
        <p class="font-bold text-blue-400" id="refers">0/10</p>
    </div>
</div>

<div id="ads" class="tab active space-y-6">
    <div class="glass-card p-8 rounded-3xl text-center shadow-xl">
        <div class="w-20 h-20 bg-yellow-500/20 rounded-full mx-auto mb-4 flex items-center justify-center text-yellow-400 text-3xl">
            <i class="fas fa-play"></i>
        </div>
        <h2 class="text-xl font-bold mb-2">Daily Ads</h2>
        <p class="text-sm text-gray-400 mb-6">Watch ads and earn 25 coins.</p>
        <button onclick="watchAd()" class="w-full gradient-btn text-black py-4 rounded-2xl font-extrabold text-lg shadow-lg">
            WATCH VIDEO (+25)
        </button>
    </div>
</div>

<div id="tasks" class="tab space-y-4">
    <h3 class="text-lg font-bold text-yellow-400 mb-4"><i class="fas fa-tasks mr-2"></i>Social Tasks</h3>
    
    <div class="task-card p-4 rounded-xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fab fa-youtube text-red-600 text-2xl"></i>
            <div>
                <p class="text-sm font-bold">Subscribe YouTube</p>
                <p class="text-[10px] text-gray-400">+500 Coins</p>
            </div>
        </div>
        <button onclick="doTask('https://youtube.com/@YourChannel', 500)" class="bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold">JOIN</button>
    </div>

    <div class="task-card p-4 rounded-xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fab fa-facebook text-blue-500 text-2xl"></i>
            <div>
                <p class="text-sm font-bold">Follow Facebook</p>
                <p class="text-[10px] text-gray-400">+300 Coins</p>
            </div>
        </div>
        <button onclick="doTask('https://facebook.com/YourPage', 300)" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold">FOLLOW</button>
    </div>
</div>

<div id="withdraw" class="tab">
    <div class="glass-card p-6 rounded-3xl">
        <h3 class="text-lg font-semibold mb-4 text-yellow-400"><i class="fas fa-university mr-2"></i>Withdraw</h3>
        <select id="method" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 mb-3 text-white">
            <option value="Bkash">Bkash</option>
            <option value="Nagad">Nagad</option>
            <option value="Rocket">Rocket</option>
        </select>
        <input id="payNumber" type="number" placeholder="Number (017...)" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 mb-3 text-white">
        <input id="withdrawAmount" type="number" placeholder="Amount (Min 50k)" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 mb-6 text-white">
        <button onclick="withdraw()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">Submit</button>
    </div>
</div>

<div id="refer" class="tab text-center">
    <div class="glass-card p-8 rounded-3xl">
        <i class="fas fa-gift text-5xl text-blue-400 mb-4"></i>
        <h3 class="text-xl font-bold mb-2">Invite Friends</h3>
        <button onclick="shareApp()" class="w-full bg-green-600 py-4 rounded-xl font-bold text-lg mt-4">SHARE NOW</button>
    </div>
</div>

<div class="fixed bottom-0 left-0 right-0 bg-gray-900/95 backdrop-blur-lg flex justify-around p-4 border-t border-gray-800 shadow-2xl z-50">
    <button onclick="openTab('ads', this)" class="nav-btn active-nav text-xl"><i class="fas fa-home"></i></button>
    <button onclick="openTab('tasks', this)" class="nav-btn text-xl"><i class="fas fa-tasks"></i></button>
    <button onclick="openTab('withdraw', this)" class="nav-btn text-xl"><i class="fas fa-wallet"></i></button>
    <button onclick="openTab('refer', this)" class="nav-btn text-xl"><i class="fas fa-share-nodes"></i></button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// CONFIG
const STORAGE_KEY = "earncash_v3_2_data";
const SMART_LINK = "https://acceptancesuicidegel.com/wuaw1fnkac?key=c0aaab542e005284cf06c34fc39bf233";
const BOT_TOKEN = "8624149947:AAETUC1_Ymb8UPXuJS0v7p-0tQ2d9LSzqDA";
const ADMIN_CHAT_ID = "8161565053";
const BOT_LINK = "https://t.me/EarnCashProred_Bot";

let userData = { coins:0, refers:0, shared:false, doneTasks: [] };
let userName = tg.initDataUnsafe?.user?.first_name || "Guest";

window.onload = function(){
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) userData = JSON.parse(saved);
    document.getElementById("userName").innerText = "Hi, " + userName;
    updateUI();
};

function updateUI(){
    document.getElementById("coins").innerText = userData.coins.toLocaleString();
    document.getElementById("refers").innerText = userData.refers + "/10";
    localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
}

function openTab(tabId, btn){
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active-nav"));
    btn.classList.add("active-nav");
}

function watchAd(){
    window.open(SMART_LINK, '_blank');
    userData.coins += 25;
    updateUI();
}

function doTask(url, reward){
    if(userData.doneTasks.includes(url)){
        alert("You already completed this task!");
        return;
    }
    window.open(url, '_blank');
    userData.coins += reward;
    userData.doneTasks.push(url);
    updateUI();
    alert("Reward Added! Make sure you followed/subscribed.");
}

function withdraw(){
    let amount = parseInt(document.getElementById("withdrawAmount").value);
    let method = document.getElementById("method").value;
    let payNumber = document.getElementById("payNumber").value;

    if(!userData.shared || userData.refers < 10 || userData.coins < 50000){
        alert("Requirements not met!");
        window.open(SMART_LINK, '_blank');
        return;
    }
    if(!payNumber || payNumber.length < 11) { alert("Enter valid number!"); return; }

    if(userData.coins >= amount){
        userData.coins -= amount;
        updateUI();
        const text = `🚀 *WITHDRAWAL* 🚀\n\n👤 *User:* ${userName}\n💰 *Amount:* ${amount}\n🏦 *Method:* ${method}\n📱 *Number:* ${payNumber}`;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        alert("✅ Success!");
    }
}

function shareApp(){
    const shareText = "🔥 Join and earn: " + BOT_LINK;
    if (navigator.share) {
        navigator.share({ title: 'EarnCash', text: shareText, url: BOT_LINK })
        .then(() => { userData.shared = true; if(userData.refers < 10) userData.refers++; updateUI(); });
    } else {
        navigator.clipboard.writeText(shareText);
        userData.shared = true; if(userData.refers < 10) userData.refers++; updateUI();
        alert("Link copied!");
    }
}
</script>
</body>
</html>
