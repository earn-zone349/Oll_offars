<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="100" cy="560" r="150" fill="rgba(255,255,255,0.04)"/>
  <!-- Logo diamond -->
  <text x="130" y="270" font-size="110" font-family="serif" fill="white" opacity="0.95">◆</text>
  <!-- Main title -->
  <text x="280" y="260" font-size="72" font-family="Arial Black, sans-serif" font-weight="900" fill="white">EarnZone Pro</text>
  <!-- Tagline -->
  <text x="280" y="320" font-size="32" font-family="Arial, sans-serif" fill="rgba(255,255,255,0.8)">Earn Real Money Online — Worldwide</text>
  <!-- Divider line -->
  <rect x="280" y="348" width="620" height="3" fill="url(#gold)" rx="2"/>
  <!-- Features row -->
  <text x="280" y="410" font-size="24" font-family="Arial, sans-serif" fill="rgba(255,255,255,0.75)">🎯 CPA Offers  &nbsp;·&nbsp;  📺 Watch Ads  &nbsp;·&nbsp;  👥 Refer Friends</text>
  <!-- Payout methods -->
  <text x="280" y="460" font-size="22" font-family="Arial, sans-serif" fill="rgba(255,255,255,0.65)">💳 bKash · Nagad · PayPal · USDT · Payoneer</text>
  <!-- Min withdrawal badge -->
  <rect x="280" y="495" width="260" height="50" rx="12" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="526" font-size="20" font-family="Arial, sans-serif" fill="#fbbf24" font-weight="700" text-anchor="middle">Min. Withdrawal: $5</text>
  <!-- Website -->
  <text x="600" y="595" font-size="22" font-family="Arial, sans-serif" fill="rgba(255,255,255,0.5)" text-anchor="middle">earnzonepro.com</text>
</svg>
